<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:#0b1120;color:#fff}

/* NAV */
nav{
position:fixed;
top:0;width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 50px;
background:rgba(0,0,0,0.8);
z-index:1000;
}
nav h2{color:#ffd54f}
nav a{color:#fff;margin:0 10px;text-decoration:none}

/* HERO */
.hero{
height:85vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:url('64.jpg') center/cover no-repeat;
position:relative;
padding-top:70px;
}

.hero::after{
content:'';
position:absolute;
width:100%;height:100%;
background:rgba(0,0,0,0.75);
}

.hero-content{
position:relative;
z-index:2;
max-width:700px;
}

.hero h1{font-size:3rem;margin-bottom:10px}
.hero p{color:#ccc}

/* SEARCH SECTION */
.search-section{
padding:40px 0;
background:#0b1120;
}

.search{
width:90%;
max-width:900px;
margin:auto;
background:#fff;
padding:15px;
border-radius:15px;
display:flex;
gap:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.search input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:#f1f1f1;
}

.search button{
background:#0078db;
color:#fff;
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
}

/* SECTION */
.section{
padding:60px 0;
}

/* GRID */
.grid{
width:90%;
max-width:1100px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

/* CARD */
.card{
background:#1e293b;
border-radius:15px;
overflow:hidden;
transition:0.3s;
text-decoration:none;
color:#fff;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.price{
color:#ffd54f;
font-weight:600;
}

/* FLOAT */
.float{
position:fixed;
right:20px;
bottom:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.float a{
padding:14px;
border-radius:50%;
color:#fff;
}

.call{background:#0078db}
.wa{background:#25d366}

/* MOBILE */
@media(max-width:768px){

nav{
flex-direction:column;
gap:10px;
}

.hero h1{
font-size:2rem;
}

.search{
flex-direction:column;
}

}
</style>
</head>

<body>
