<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:#0b1120;color:#fff}

/* NAV */
nav{
position:fixed;
top:0;width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 50px;
background:rgba(0,0,0,0.8);
z-index:1000;
}
nav h2{color:#ffd54f}
nav a{color:#fff;margin:0 10px;text-decoration:none}

/* HERO */
.hero{
height:85vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:url('64.jpg') center/cover no-repeat;
position:relative;
padding-top:70px;
}

.hero::after{
content:'';
position:absolute;
width:100%;height:100%;
background:rgba(0,0,0,0.75);
}

.hero-content{
position:relative;
z-index:2;
max-width:700px;
}

.hero h1{font-size:3rem;margin-bottom:10px}
.hero p{color:#ccc}

/* SEARCH SECTION */
.search-section{
padding:40px 0;
background:#0b1120;
}

.search{
width:90%;
max-width:900px;
margin:auto;
background:#fff;
padding:15px;
border-radius:15px;
display:flex;
gap:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.search input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:#f1f1f1;
}

.search button{
background:#0078db;
color:#fff;
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
}

/* SECTION */
.section{
padding:60px 0;
}

/* GRID */
.grid{
width:90%;
max-width:1100px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

/* CARD */
.card{
background:#1e293b;
border-radius:15px;
overflow:hidden;
transition:0.3s;
text-decoration:none;
color:#fff;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.price{
color:#ffd54f;
font-weight:600;
}

/* FLOAT */
.float{
position:fixed;
right:20px;
bottom:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.float a{
padding:14px;
border-radius:50%;
color:#fff;
}

.call{background:#0078db}
.wa{background:#25d366}

/* MOBILE */
@media(max-width:768px){

nav{
flex-direction:column;
gap:10px;
}

.hero h1{
font-size:2rem;
}

.search{
flex-direction:column;
}

}

/* POPUP */
.popup{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
z-index:2000;
}

.popup-box{
background:#fff;
color:#000;
padding:30px;
border-radius:15px;
width:90%;
max-width:400px;
text-align:center;
animation:pop 0.3s ease;
}

.popup-box h2{
margin-bottom:15px;
}

.popup-box input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

.popup-box button{
background:#0078db;
color:#fff;
padding:12px;
border:none;
border-radius:8px;
width:100%;
cursor:pointer;
}

.close{
position:absolute;
right:15px;
top:10px;
font-size:20px;
cursor:pointer;
}

@keyframes pop{
from{transform:scale(0.8);opacity:0}
to{transform:scale(1);opacity:1}
}
</style>
</head>

<body>

<nav>
<h2>Narendra Property</h2>

<!-- HERO -->

</div>
<!-- PROPERTIES -->
<section class="section">

<a href="#" class="card">

<!-- FLOAT -->
<div class="float">
<a href="tel:+917767933864" class="call"><i class="fa fa-phone"></i></a>
<a href="https://wa.me/917767933864" class="wa"><i class="fab fa-whatsapp"></i></a>
</div>
<script>
    

// OPEN
function openPopup(){
document.getElementById("leadPopup").style.display="flex";
}

// CLOSE
function closePopup(){
document.getElementById("leadPopup").style.display="none";
}

// SUBMIT
function submitLead(){

let name = document.getElementById("leadName").value;
let phone = document.getElementById("leadPhone").value;
let budget = document.getElementById("leadBudget").value;

// VALIDATION
if(name === "" || phone === ""){
alert("Please fill required details");
return;
}

// WHATSAPP MESSAGE
let message = `New Lead 🔥%0AName: ${name}%0APhone: ${phone}%0ABudget: ${budget}`;
let url = `https://wa.me/917767933864?text=${message}`;

window.open(url, "_blank");

// SAVE LOCAL (OPTIONAL)
let leads = JSON.parse(localStorage.getItem("leads")) || [];
leads.push({name, phone, budget});
localStorage.setItem("leads", JSON.stringify(leads));

closePopup();
}

// AUTO POPUP AFTER 5 SEC
setTimeout(openPopup, 5000);

</script>

</body>
</html>
